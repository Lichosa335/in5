<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tabl.css">
    <script src="tabl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Тест Шульте</title>
</head>
<body>
    <div class=" ">
        <div >
                <a href="../../index.html" class="btn btn-dark ms-5 mt-5 cnop " ><p class="e1"> Назад</p></a>
        </div>
        <div class=" ">
                <a href="../swet/swet.html" class="btn btn-secondary ms-5 mt-5 cnop " > <p class="e1"> Тренажер</p></a>
        </div>
    </div>
        <div class="container body py-5">
        <div class="schulte-container text-center">
            <h1 class="mb-4"> Тест Шульте</h1>
            <p class="lead mb-4">Найдите и кликайте числа по порядку от 1 до 25 как можно быстрее!</p>

            <div class="stats">
                <div class="row text-center">
                    <div class="col-md-4">
                        <h5>Время</h5>
                        <div class="timer" id="timer">00.00</div>
                    </div>
                    <div class="col-md-4">
                        <h5>Текущее число</h5>
                        <div class="h3 text-" id="currentNumber">1</div>
                    </div>
                    <div class="col-md-4">
                        <h5>Попытка</h5>
                        <div class="h4 text-" id="attemptCount">1</div>
                    </div>
                </div>
            </div>

            <div class="schulte-grid" id="schulteGrid">
                <!-- Ячейки будут сгенерированы JavaScript -->
            </div>

            <div class="mt-4">
                <button class="btn btn-dark me-3" onclick="startGame()" > Начать игру</button>
                <button class="btn btn-secondary" onclick="resetGame()"> Сбросить</button>
            </div>

            <!-- Таблица результатов -->
            <div class="results-table " id="resultsTable" style="display: none;">
                <h4 class="mb-3"> Ваши результаты</h4>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Попытка</th>
                            <th>Время</th>
                            <th>Дата</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Результаты будут добавлены сюда -->
                    </tbody>
                </table>
                <button class="btn btn-outline-primary btn-sm" onclick="clearResults()">Очистить историю</button>
            </div>
        </div>
    </div>

    <script>

    </script>
</body>
</html>
